<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account Access - Belmarck Store</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Belmarck Store - Account Access</h1>
  </header>

  <!-- Dual Authentication Control Box Card -->
  <div class="cart-page-container" style="max-width: 420px; margin: 60px auto;">
    
    <!-- Login Panel Form UI -->
    <div id="login-form-panel">
      <h2>Customer Login</h2>
      <div class="delivery-form" style="border:none; padding:0; margin-top:15px;">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="login-username" placeholder="Enter your username">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="Enter your password">
        </div>
        <button class="payout-btn" onclick="submitLogin()" style="margin-top:10px;">Login</button>
        <p style="margin-top:15px; text-align:center; font-size:14px;">
          Don't have an account? <a href="#" onclick="togglePanels(true)" style="color:#ff6600; font-weight:bold;">Sign Up Here</a>
        </p>
      </div>
    </div>

    <!-- Sign Up Panel Form UI -->
    <div id="signup-form-panel" style="display: none;">
      <h2>Create Account</h2>
      <div class="delivery-form" style="border:none; padding:0; margin-top:15px;">
        <div class="form-group">
          <label>Choose Username</label>
          <input type="text" id="signup-username" placeholder="Create a username">
        </div>
        <div class="form-group">
          <label>Create Password</label>
          <input type="password" id="signup-password" placeholder="Create a password">
        </div>
        <button class="payout-btn" onclick="submitSignUp()" style="background-color:#25D366; margin-top:10px;">Register Account</button>
        <p style="margin-top:15px; text-align:center; font-size:14px;">
          Already have an account? <a href="#" onclick="togglePanels(false)" style="color:#ff6600; font-weight:bold;">Login Here</a>
        </p>
      </div>
    </div>

  </div>

  <script>
    // Switches views between the registration and credentials verification layouts
    function togglePanels(showSignUp) {
      document.getElementById("login-form-panel").style.display = showSignUp ? "none" : "block";
      document.getElementById("signup-form-panel").style.display = showSignUp ? "block" : "none";
    }

    // Handles user authentication
    function submitLogin() {
      const username = document.getElementById("login-username").value.trim();
      const password = document.getElementById("login-password").value.trim();

      if (!username || !password) { alert("Please enter both fields!"); return; }

      fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      })
      .then(res => res.json())
      .then(data => {
        if(data.success) {
          localStorage.setItem("belmarck_logged_in", "true");
          window.location.href = "index.html";
        } else {
          alert("Error: " + data.message);
        }
      }).catch(() => alert("Connection error."));
    }

    // Handles database account creation
    function submitSignUp() {
      const username = document.getElementById("signup-username").value.trim();
      const password = document.getElementById("signup-password").value.trim();

      if (!username || !password) { alert("Please fill out all configuration parameters!"); return; }

      fetch('/api/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      })
      .then(res => res.json())
      .then(data => {
        if(data.success) {
          alert(data.message);
          // Reset input elements and toggle framework panel state view back to standard Login
          document.getElementById("signup-username").value = "";
          document.getElementById("signup-password").value = "";
          togglePanels(false);
        } else {
          alert("Sign up failed: " + data.message);
        }
      }).catch(() => alert("Connection error."));
    }
  </script>
</body>
</html>
